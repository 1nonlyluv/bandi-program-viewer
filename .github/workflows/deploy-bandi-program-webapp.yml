name: Deploy Bandi Program Webapp

"on":
  push:
    branches:
      - main
    paths:
      - "bandi_program/webapp/**"
      - "bandi_program/data/generated/program_schedule_week*.json"
      - "bandi_program/build_program_schedule_bundle.py"
      - "bandi_program/write_webapp_version.py"
      - ".github/workflows/deploy-bandi-program-webapp.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-bandi-program"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build webapp bundle
        working-directory: bandi_program
        run: |
          python3 build_program_schedule_bundle.py \
            data/generated/program_schedule_week*.json \
            --output webapp/assets/program_schedule.json

      - name: Write webapp version
        working-directory: bandi_program
        run: |
          python3 write_webapp_version.py \
            --output webapp/assets/version.json \
            --version "${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bandi_program/webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
