<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>반디 프로그램 뷰어</title>
  <script>
    (function () {
      function appendScript(src) {
        return new Promise(function (resolve, reject) {
          var script = document.createElement("script");
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      function loadAssets(version) {
        var suffix = version ? "?v=" + encodeURIComponent(version) : "";
        var stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "./assets/program-viewer.css" + suffix;
        document.head.appendChild(stylesheet);

        appendScript("./assets/selectors.js" + suffix)
          .then(function () {
            return appendScript("./assets/program-viewer.js" + suffix);
          })
          .catch(function () {
            document.getElementById("app").innerHTML = "<p>뷰어 파일을 불러오지 못했습니다.</p>";
          });
      }

      fetch("./assets/version.json", { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("version");
          }
          return response.json();
        })
        .then(function (payload) {
          var version = payload && payload.version ? String(payload.version) : "";
          if (version) {
            var nextUrl = new URL(window.location.href);
            if (nextUrl.searchParams.get("v") !== version) {
              nextUrl.searchParams.set("v", version);
              window.history.replaceState(null, "", nextUrl.toString());
            }
          }
          loadAssets(version);
        })
        .catch(function () {
          loadAssets("");
        });
    })();
  </script>
</head>
<body data-page="now">
  <main class="pv-shell" id="app"></main>
</body>
</html>
