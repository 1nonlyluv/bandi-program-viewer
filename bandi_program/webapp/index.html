<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>반디 프로그램</title>
  <link rel="canonical" href="./program-index.html" />
  <script>
    (function () {
      function redirect(version) {
        var target = "./program-index.html";
        if (version) {
          target += "?v=" + encodeURIComponent(version);
        }
        window.location.replace(target);
      }

      fetch("./assets/version.json", { cache: "no-store" })
        .then(function (response) {
          return response.ok ? response.json() : null;
        })
        .then(function (payload) {
          redirect(payload && payload.version ? String(payload.version) : "");
        })
        .catch(function () {
          redirect("");
        });
    })();
  </script>
</head>
<body>
  <p><a href="./program-index.html">반디 프로그램 뷰어로 이동</a></p>
</body>
</html>
